version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - /home/quantic/NoctIS/breaches:/breaches:ro  # Mount OSINT data as read-only
    environment:
      - PYTHONUNBUFFERED=1
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-noctis_production_key_CHANGE_ME}
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_PROTOCOL=http
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - typesense
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:5173"
    environment:
      - VITE_API_URL=http://192.168.1.44:8000
    depends_on:
      - backend
    restart: unless-stopped

  typesense:
    image: typesense/typesense:26.0
    ports:
      - "8108:8108"
    volumes:
      - /home/quantic/NoctIS/data/typesense:/data  # Externalized volume for production
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_API_KEY:-noctis_production_key_CHANGE_ME}
      --enable-cors
    restart: unless-stopped
