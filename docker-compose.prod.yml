services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - /home/quantic/NoctIS/breaches:/breaches:ro  # Mount OSINT data as read-only
      - /home/quantic/NoctIS/data/import_jobs:/app/data  # Persistent job storage
    environment:
      - PYTHONUNBUFFERED=1
      - MEILISEARCH_HOST=meilisearch
      - MEILISEARCH_PORT=7700
      - MEILISEARCH_MASTER_KEY=noctis_meilisearch_master_key_change_in_prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - meilisearch
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:5173"
    environment:
      - VITE_API_URL=http://192.168.1.44:8000
    depends_on:
      - backend
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.7
    ports:
      - "7700:7700"
    volumes:
      - /home/quantic/NoctIS/data/meilisearch:/meili_data
    environment:
      - MEILI_MASTER_KEY=noctis_meilisearch_master_key_change_in_prod
      - MEILI_ENV=production
      - MEILI_DB_PATH=/meili_data
      - MEILI_MAX_INDEXING_MEMORY=12gb  # Increased for large batches
      - MEILI_MAX_INDEXING_THREADS=6    # More threads for parallel indexing
      - MEILI_LOG_LEVEL=INFO
    mem_limit: 14g  # Increased memory limit
    cpus: "6"       # More CPU for faster indexing
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
