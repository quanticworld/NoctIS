services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"  # Port 8001 pour éviter collision avec Mind
    volumes:
      - /:/host:ro  # Mount root filesystem as read-only for full file access
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_HTTP_PORT=8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=noctis_dev_clickhouse_password
      - CLICKHOUSE_DATABASE=noctis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - clickhouse

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5173"  # Port 5174 pour éviter collision
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_WS_URL=ws://backend:8000
    command: npm run dev -- --host
    depends_on:
      - backend

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    ports:
      - "9000:9000"    # Native protocol
      - "8123:8123"    # HTTP interface
    volumes:
      # Production: Use external data volume (same USB drive as meilisearch)
      - /media/quantic/80c1859f-536b-459f-a547-d6ecf1dfceea/home/quantic/NoctIS/data/clickhouse:/var/lib/clickhouse
      # Development: Use local docker volume (uncomment to use instead)
      # - clickhouse-data:/var/lib/clickhouse
      # Mount init SQL scripts
      - ./backend/sql/clickhouse:/docker-entrypoint-initdb.d
    environment:
      - CLICKHOUSE_DB=noctis
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=noctis_dev_clickhouse_password
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  clickhouse-data:
