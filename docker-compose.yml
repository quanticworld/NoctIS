services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - /:/host:ro  # Mount root filesystem as read-only for full file access
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - MEILISEARCH_HOST=meilisearch
      - MEILISEARCH_PORT=7700
      - MEILISEARCH_MASTER_KEY=noctis_dev_meilisearch_key
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - meilisearch

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_WS_URL=ws://backend:8000
    command: npm run dev -- --host
    depends_on:
      - backend

  meilisearch:
    image: getmeili/meilisearch:v1.7
    ports:
      - "7700:7700"
    volumes:
      # Production: Use external data volume (USB drive or external storage)
      - /media/quantic/80c1859f-536b-459f-a547-d6ecf1dfceea/home/quantic/NoctIS/data/meilisearch:/meili_data
      # Development: Use local docker volume (uncomment to use instead)
      # - meilisearch-data:/meili_data
    environment:
      - MEILI_MASTER_KEY=noctis_dev_meilisearch_key
      - MEILI_ENV=development
      - MEILI_DB_PATH=/meili_data
      - MEILI_MAX_INDEXING_MEMORY=4gb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  meilisearch-data:
