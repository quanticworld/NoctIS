services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"  # Port 8001 pour éviter collision avec Mind
    volumes:
      - /:/host:ro  # Mount root filesystem as read-only for full file access
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_HTTP_PORT=8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=noctis_dev_clickhouse_password
      - CLICKHOUSE_DATABASE=noctis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5173"  # Port 5174 pour éviter collision
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_WS_URL=ws://backend:8000
    command: npm run dev -- --host
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    ports:
      - "9000:9000"    # Native protocol
      - "8123:8123"    # HTTP interface
    volumes:
      # EXTERNAL OS: Direct path since we're running ON the external disk
      - /home/quantic/NoctIS/data/clickhouse:/var/lib/clickhouse
      # Mount init SQL scripts
      - ./backend/sql/clickhouse:/docker-entrypoint-initdb.d
    environment:
      - CLICKHOUSE_DB=noctis
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=noctis_dev_clickhouse_password
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

volumes:
  clickhouse-data:
